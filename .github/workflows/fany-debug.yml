name: fany-debug

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests beautifulsoup4

      - name: "1) Webhook 配線チェック"
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python -c "import fany_watch as f; print('webhook set:', bool(f.DISCORD_WEBHOOK_URL)); print('sent:', f.send_discord({'content':'✅ GitHub Actions テスト通知'}))"

      - name: "2) スクレイプ命中チェック（新関数）"
        run: |
          python -c "import fany_watch as f; [print(kw, '->', [(e['id'], e['date'], [k for k in f.KEYWORDS if k in e['search_text']]) for e in f.search_events(kw)]) for kw in f.KEYWORDS]"

      - name: "3) scrape 実行"
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python fany_watch.py scrape

      - name: "HTML構造ダンプ2"
        run: |
          python -c "
          import fany_watch as f, re
          from bs4 import BeautifulSoup
          html = f.get(f.SEARCH, params={'keywords':'ドンデコルテ','search_type':'search_string'})
          soup = BeautifulSoup(html, 'html.parser')
          box = soup.find(class_=re.compile('performanceListBox'))
          print('=== 公演ブロック1つ分 ===')
          print(box.prettify()[:2500] if box else 'ブロック見つからず')
          print('=== a href 一覧（ブロック内） ===')
          if box:
              for a in box.find_all('a'): print(a.get('href'))
          "
