name: fany-debug

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests beautifulsoup4

      - name: "1) Webhook 配線チェック"
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python -c "import fany_watch as f; print('webhook set:', bool(f.DISCORD_WEBHOOK_URL)); print('sent:', f.send_discord({'content':'✅ GitHub Actions テスト通知'}))"

      - name: "2) スクレイプ命中チェック（新関数）"
        run: |
          python -c "import fany_watch as f; [print(kw, '->', [(e['id'], e['date'], [k for k in f.KEYWORDS if k in e['search_text']]) for e in f.search_events(kw)]) for kw in f.KEYWORDS]"

      - name: "3) scrape 実行"
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python fany_watch.py scrape
        
      - name: "検索件数とマッチ件数の調査"
        run: |
          python -c "
          import fany_watch as f
          for kw in f.KEYWORDS:
              evs = f.search_events(kw)
              hit = [e for e in evs if kw in e['search_text']]
              print(f'{kw}: パース公演={len(evs)}件 / うち出演欄に名前あり={len(hit)}件')
          print('---')
          # ドンデコルテでヒットしなかった公演の出演欄を数件サンプル表示
          evs = f.search_events('ドンデコルテ')
          miss = [e for e in evs if 'ドンデコルテ' not in e['search_text']]
          print(f'名前が出演欄に見えない公演: {len(miss)}件（先頭3件の出演欄↓）')
          for e in miss[:3]:
              print(' 日付:', e['date'], '| 出演:', repr(e['cast'][:80]))
          print('--- 先着枠の有無 ---')
          for e in evs[:5]:
              sen = [s for s in e['sales'] if s['cat']=='先着']
              print(e['date'], 'title=', e['title'][:20], '先着枠=', sen)
          "
      - name: "公演の区切り単位を特定"
        run: |
          python -c "
          import fany_watch as f, re
          from bs4 import BeautifulSoup
          html = f.get(f.SEARCH, params={'keywords':'ドンデコルテ','search_type':'search_string'})
          soup = BeautifulSoup(html, 'html.parser')
          # 各要素が何個あるか数える
          print('__outline    :', len(soup.find_all(class_='fany_performanceListBox__outline')))
          print('__header     :', len(soup.find_all(class_='fany_performanceListBox__header')))
          print('__headerTitle:', len(soup.find_all(class_='fany_performanceListBox__headerTitle')))
          print('preview_block:', len(soup.find_all(class_='preview_block')))
          print('reception link:', len(soup.find_all('a', href=re.compile(r'/reception/'))))
          # headerTitle の親をたどって、公演を囲む共通クラスを探す
          t = soup.find(class_='fany_performanceListBox__headerTitle')
          print('--- headerTitle の祖先クラス階層 ---')
          p = t
          for _ in range(6):
              p = p.parent
              if p is None: break
              print(' ', p.name, p.get('class'))
          "
      - name: "ページネーション方式の調査"
        run: |
          python -c "
          import fany_watch as f, re
          from bs4 import BeautifulSoup
          html = f.get(f.SEARCH, params={'keywords':'ドンデコルテ','search_type':'search_string'})
          soup = BeautifulSoup(html, 'html.parser')
          # 総件数の表示を探す
          m = re.search(r'検索結果\s*(\d+)\s*件', soup.get_text())
          print('総件数表示:', m.group(1) if m else '見つからず')
          print('1ページの公演数:', len(soup.find_all(class_='fany_performanceListBox__header')))
          # ページ送りリンク・ボタンを探す
          print('--- page/次へ 系のリンク ---')
          for a in soup.find_all('a', href=True):
              h = a['href']
              if re.search(r'page|p=|offset|次|more', h + a.get_text()):
                  print(repr(a.get_text(strip=True)[:20]), '->', h[:120])
          # ページ番号やlimit系のパラメータを含むフォーム/inputを探す
          print('--- input(hidden含む) ---')
          for inp in soup.find_all('input'):
              print(inp.get('name'), '=', inp.get('value'), '(', inp.get('id'), ')')
          "
      - name: "display_item_count で全件取得を試す"
        run: |
          python -c "
          import fany_watch as f
          from bs4 import BeautifulSoup
          # display_item_count を100にして投げてみる
          for cnt in [100]:
              html = f.get(f.SEARCH, params={'keywords':'ドンデコルテ','search_type':'search_string','display_item_count':cnt})
              soup = BeautifulSoup(html, 'html.parser')
              n = len(soup.find_all(class_='fany_performanceListBox__header'))
              print(f'display_item_count={cnt} -> 公演 {n} 件取得')
          "
