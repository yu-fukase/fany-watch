name: fany-debug

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests beautifulsoup4

      - name: "1) Webhook 配線チェック"
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python -c "import fany_watch as f; print('webhook set:', bool(f.DISCORD_WEBHOOK_URL)); print('sent:', f.send_discord({'content':'✅ GitHub Actions テスト通知'}))"

      - name: "2) スクレイプ命中チェック（新関数）"
        run: |
          python -c "import fany_watch as f; [print(kw, '->', [(e['id'], e['date'], [k for k in f.KEYWORDS if k in e['search_text']]) for e in f.search_events(kw)]) for kw in f.KEYWORDS]"

      - name: "3) scrape 実行"
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python fany_watch.py scrape
        
      - name: "検索件数とマッチ件数の調査"
        run: |
          python -c "
          import fany_watch as f
          for kw in f.KEYWORDS:
              evs = f.search_events(kw)
              hit = [e for e in evs if kw in e['search_text']]
              print(f'{kw}: パース公演={len(evs)}件 / うち出演欄に名前あり={len(hit)}件')
          print('---')
          # ドンデコルテでヒットしなかった公演の出演欄を数件サンプル表示
          evs = f.search_events('ドンデコルテ')
          miss = [e for e in evs if 'ドンデコルテ' not in e['search_text']]
          print(f'名前が出演欄に見えない公演: {len(miss)}件（先頭3件の出演欄↓）')
          for e in miss[:3]:
              print(' 日付:', e['date'], '| 出演:', repr(e['cast'][:80]))
          print('--- 先着枠の有無 ---')
          for e in evs[:5]:
              sen = [s for s in e['sales'] if s['cat']=='先着']
              print(e['date'], 'title=', e['title'][:20], '先着枠=', sen)
          "
